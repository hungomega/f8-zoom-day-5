<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/form.css" />
        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/style.css">
        <title>Form</title>
    </head>
    <body>
        <div class="container">
            <h1>Register</h1>
            <form action="/submit" method="post" autocomplete="off">
                <label>
                    Username:
                    <input
                        type="text"
                        name="username"
                        placeholder="Nguyen Huu Hung"
                        required
                        spellcheck="false"
                    />
                </label>
                <br />

                <label>
                    Email:
                    <input
                        type="email"
                        name="email"
                        placeholder="nguyenhuuhung@example.com"
                        required
                        spellcheck="false"
                    />
                </label>
                <br />

                <label>
                    Phone Number:
                    <input
                        type="tel"
                        name="phone"
                        placeholder="0123456789"
                        spellcheck="false"
                    />
                </label>
                <br />

                <label>
                    Password:
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        spellcheck="false"
                    />
                </label>
                <br />

                <label>
                    Confirm Password:
                    <input
                        type="password"
                        name="confirm_password"
                        placeholder="Confirm your password"
                        required
                        spellcheck="false"
                    />
                </label>
                <br />

                <label>
                    Gender:
                    <select name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </label>
                <br />

                <label>
                    Date of Birth:
                    <input type="date" name="dob" />
                </label>
                <br />

                <label>
                    Address:
                    <input
                        type="text"
                        name="address"
                        placeholder="Enter your address"
                        spellcheck="false"
                    />
                </label>
                <br />

                <label for="avatar">
                    <p>Profile Avatar:</p>
                </label>
                <label for="avatar" class="avatar-box"> </label>
                <input
                    type="file"
                    id="avatar"
                    name="avatar"
                    accept="image/*"
                    hidden
                />
                <br />
                <p>Communication Preferences:</p>

                <div class="check-group">
                    <label>
                        <input
                            type="checkbox"
                            name="preferences"
                            value="newsletter"
                        />
                        Subscribe to Newsletter     
                    </label>

                    <label>
                        <input
                            type="checkbox"
                            name="preferences"
                            value="promotions"
                        />
                        Receive Promotional Emails
                    </label>

                    <label>
                        <input
                            type="checkbox"
                            name="preferences"
                            value="updates"
                        />
                        Get Product Updates
                    </label>
                </div>
                <button type="submit">Register</button>
            </form>
        </div>
    </body>
</html>
